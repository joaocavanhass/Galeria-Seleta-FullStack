<div class="admin-shell" [class.sidebar-collapsed]="!sidebarOpen()">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand" [class.collapsed]="!sidebarOpen()">
        <span class="brand-icon">◈</span>
        <span class="brand-text">Galeria Seleta</span>
      </div>
      <button class="toggle-btn" (click)="sidebarOpen.set(!sidebarOpen())">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="admin-tag" *ngIf="sidebarOpen()">
      <span>&#64;admin</span>
    </div>

    <nav class="sidebar-nav">
      <a *ngFor="let item of navItems"
         [routerLink]="item.route"
         class="nav-item"
         [class.active]="isActive(item.route)"
         [title]="!sidebarOpen() ? item.label : ''">

        <!-- Dashboard icon -->
        <svg *ngIf="item.icon === 'dashboard'" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <!-- Users icon -->
        <svg *ngIf="item.icon === 'users'" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <!-- Products icon -->
        <svg *ngIf="item.icon === 'products'" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <!-- Orders icon -->
        <svg *ngIf="item.icon === 'orders'" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="2"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>

        <span class="nav-label">{{ item.label }}</span>
        <span *ngIf="isActive(item.route)" class="active-dot"></span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()" [title]="!sidebarOpen() ? 'Sair' : ''">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="nav-label">Sair</span>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-area">
    <header class="top-bar">
      <div class="topbar-left">
        <div class="breadcrumb">
          <span class="bc-root">Admin</span>
          <span class="bc-sep">/</span>
          <span class="bc-current">{{ activeRoute().split('/').pop() | titlecase }}</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="user-pill" (click)="showUserMenu.set(!showUserMenu())">
          <div class="user-avatar">{{ admin?.nome?.charAt(0) || 'A' }}</div>
          <div class="user-info" *ngIf="true">
            <span class="user-name">{{ admin?.nome }}</span>
            <span class="user-role">&#64;admin</span>
          </div>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div class="user-dropdown" *ngIf="showUserMenu()">
          <div class="dropdown-email">{{ admin?.email }}</div>
          <button class="dropdown-item logout" (click)="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sair
          </button>
        </div>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
