<link rel="stylesheet" href="./admin-login.component.css">

<div class="login-page">
  <div class="login-bg">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="brand-mark">
          <span class="brand-icon">◈</span>
          <span class="brand-name">Galeria Seleta</span>
        </div>
        <div class="admin-badge">PAINEL ADMINISTRATIVO</div>
        <h1>Acesso Restrito</h1>
        <p>Apenas administradores autorizados</p>
      </div>

      <form class="login-form" (ngSubmit)="login()">
        <div class="field-group">
          <label for="email">E-mail</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input
              id="email"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="admin&#64;galeriaseleta.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="field-group">
          <label for="senha">Senha</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="senha"
              [type]="mostrarSenha() ? 'text' : 'password'"
              [(ngModel)]="senha"
              name="senha"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-senha" (click)="mostrarSenha.set(!mostrarSenha())">
              <svg *ngIf="!mostrarSenha()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg *ngIf="mostrarSenha()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="erro-msg" *ngIf="erro()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ erro() }}
        </div>

        <button type="submit" class="btn-login" [class.loading]="loading()" [disabled]="loading()">
          <span *ngIf="!loading()">Entrar no Painel</span>
          <span *ngIf="loading()" class="spinner-row">
            <span class="spinner"></span> Verificando...
          </span>
        </button>
      </form>

      <div class="login-hint">
        <span>Credenciais de demonstração:</span>
        <code>admin&#64;galeriaseleta.com / admin123</code>
      </div>
    </div>
  </div>
</div>
