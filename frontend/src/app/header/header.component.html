<header class="header">

  <!-- ── Barra superior ── -->
  <div class="header-top">

    <!-- Esquerda: menu + busca -->
    <div class="header-left">
      <button class="btn-menu" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="search-bar">
        <input type="text" placeholder="O que procura?" [(ngModel)]="termoBusca" />
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
    </div>

    <!-- Centro: logo -->
    <a class="header-logo" routerLink="/">
      <img src="/LogoNova-removebg.png" alt="Galeria Seleta" class="logo-img" />
      <div class="logo-texto">
        <span class="logo-nome">Galeria</span>
        <span class="logo-sub">Seleta</span>
      </div>
    </a>

    <!-- Direita: carrinho + perfil -->
    <div class="header-right">
      <button class="btn-icone btn-carrinho" aria-label="Carrinho" routerLink="/carrinho">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        @if (totalItens > 0) {
          <span class="cart-badge">{{ totalItens }}</span>
        }
      </button>

      <!-- Não logado: vai para login -->
      <button *ngIf="!usuarioLogado" class="btn-icone" aria-label="Entrar" routerLink="/login">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>

      <!-- Logado: dropdown -->
      <div *ngIf="usuarioLogado" class="user-menu-wrapper">
        <button class="btn-icone user-btn" (click)="toggleMenu()" [attr.aria-expanded]="menuAberto()">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span class="user-nome">{{ primeiroNome }}</span>
        </button>

        <div class="user-dropdown" *ngIf="menuAberto()" (click)="fecharMenu()">
          <button class="dropdown-item" (click)="irParaMeusPedidos()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
              <rect x="9" y="3" width="6" height="4" rx="1"/>
            </svg>
            Meus Pedidos
          </button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" (click)="logout()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Sair
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Navbar ── -->
  <nav class="header-nav">
    <a routerLink="/novidades" routerLinkActive="ativo">Novidades</a>
    <a routerLink="/produtos" routerLinkActive="ativo">Produtos</a>
    <a routerLink="/sobre" routerLinkActive="ativo">Sobre Nós</a>
  </nav>

</header>
