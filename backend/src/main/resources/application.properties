# ============================================================
# ARQUIVO: application.properties
# FUNÇÃO: Arquivo de configuração principal do Spring Boot.
# Define todas as configurações do servidor, banco de dados, JPA e JWT.
#
# O QUE É application.properties?
# É o arquivo central de configuração do Spring Boot.
# Ao iniciar, o Spring lê este arquivo e configura automaticamente:
# - Qual porta o servidor vai escutar
# - Como conectar ao banco de dados
# - Como o Hibernate deve gerenciar as tabelas
# - Segredos e configurações de JWT
#
# FORMATO: chave=valor
# Linhas que começam com '#' são comentários (ignorados pelo Spring).
# ============================================================

# Nome da aplicação (usado em logs e métricas)
spring.application.name=galeria-seleta-api

# Porta em que o servidor HTTP vai rodar.
# O frontend Angular (localhost:4200) faz requisições para localhost:8080.
server.port=8080

# -------------------------------------------------------
# ENCODING UTF-8
# Garante que acentos e caracteres especiais do português
# (ã, ç, é, etc.) funcionem corretamente nas respostas JSON.
# -------------------------------------------------------
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

# Nível de log para as classes do projeto.
# DEBUG: exibe logs detalhados (útil em desenvolvimento).
# Em produção, trocar para INFO ou WARN para reduzir ruído nos logs.
logging.level.com.galeriaseleta=DEBUG

# -------------------------------------------------------
# BANCO DE DADOS SQLite
# SQLite é um banco de dados baseado em arquivo (sem servidor separado).
# O arquivo galeria_seleta.db é criado na raiz do projeto.
#
# jdbc:sqlite: → protocolo de conexão para SQLite via JDBC
# ./galeria_seleta.db → caminho relativo ao diretório onde o servidor é iniciado
# -------------------------------------------------------
spring.datasource.url=jdbc:sqlite:./galeria_seleta.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# -------------------------------------------------------
# HIBERNATE / JPA
# Configurações do ORM (mapeamento objeto-relacional).
#
# database-platform: dialeto SQL específico do SQLite.
#   O Hibernate adapta as queries SQL para funcionar com o SQLite.
#
# ddl-auto=none: o Hibernate NÃO cria nem altera tabelas automaticamente.
#   As tabelas são criadas pelo schema.sql (veja abaixo).
#   Opções possíveis: create, create-drop, update, validate, none.
#
# show-sql=true: exibe no console cada query SQL executada.
#   Útil para debug — ver exatamente o que o Hibernate está fazendo.
#   Em produção, mudar para false para não poluir os logs.
# -------------------------------------------------------
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# -------------------------------------------------------
# INICIALIZAÇÃO DO BANCO DE DADOS
# O Spring executa o schema.sql automaticamente ao iniciar.
#
# init.mode=always: sempre executa o schema.sql (mesmo se o banco já existir).
#   O schema.sql usa "CREATE TABLE IF NOT EXISTS" — seguro rodar várias vezes.
#
# schema-locations: caminho do arquivo SQL dentro do classpath (src/main/resources/).
# -------------------------------------------------------
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# -------------------------------------------------------
# JWT — JSON Web Token
# Configurações para geração e validação dos tokens de autenticação.
#
# jwt.secret: chave secreta para assinar os tokens.
#   ${JWT_SECRET:dev-secret-local...}: lê da variável de ambiente JWT_SECRET.
#   Se a variável não existir, usa o valor padrão (após o ':').
#   IMPORTANTE: Em produção, sempre definir JWT_SECRET como variável de ambiente!
#   O valor padrão é inseguro e NÃO deve ser usado em produção.
#
# jwt.expiration=86400000: tempo de vida do access token em milissegundos.
#   86400000 ms = 86400 s = 1440 min = 24 horas
#
# jwt.refresh-expiration=604800000: tempo de vida do refresh token.
#   604800000 ms = 604800 s = 10080 min = 7 dias
# -------------------------------------------------------
jwt.secret=${JWT_SECRET:dev-secret-local-nao-usar-em-producao}
jwt.expiration=86400000
jwt.refresh-expiration=604800000
