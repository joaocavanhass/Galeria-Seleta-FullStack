spring.application.name=galeria-seleta-api
server.port=8080

logging.level.com.galeriaseleta=DEBUG

# SQLite
spring.datasource.url=jdbc:sqlite:./galeria_seleta.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Inicializa o schema.sql na startup (CREATE TABLE IF NOT EXISTS e seguro rodar sempre)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# JWT — troque jwt.secret por uma chave aleatória segura em produção
jwt.secret=galeria-seleta-jwt-secret-key-producao-2025
jwt.expiration=86400000
jwt.refresh-expiration=604800000
